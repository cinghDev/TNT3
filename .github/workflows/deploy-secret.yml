name: Generate Secret Config

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Create config.js with secret
        run: |
          echo "window.RUBY_CONFIG = { SECRET_KEY: '${{ secrets.RUBY_SECRET_KEY }}' };" > config.js
      
      - name: Commit config.js to main branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add config.js
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate config.js [skip ci]"
          git push
